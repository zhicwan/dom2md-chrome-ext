<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DOM → MD</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 12px;
        color: #e8eaed;
        background: #202124;
        padding: 8px;
        min-height: 100vh;
      }

      .toolbar {
        display: flex;
        gap: 6px;
        margin-bottom: 8px;
      }

      button {
        padding: 4px 12px;
        border: 1px solid #5f6368;
        border-radius: 4px;
        background: #303134;
        color: #e8eaed;
        font-size: 12px;
        cursor: pointer;
        transition: background 0.15s;
      }
      button:hover {
        background: #3c4043;
      }
      button:active {
        background: #4a4d51;
      }

      #copy-btn {
        background: #8ab4f8;
        color: #202124;
        border-color: #8ab4f8;
        font-weight: 600;
      }
      #copy-btn:hover {
        background: #aecbfa;
      }

      #status {
        font-size: 11px;
        padding: 4px 0;
        min-height: 20px;
        color: #9aa0a6;
      }
      #status.success {
        color: #81c995;
      }
      #status.error {
        color: #f28b82;
      }

      #preview {
        background: #292b2e;
        border: 1px solid #3c4043;
        border-radius: 4px;
        padding: 8px;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: 'Consolas', 'Courier New', monospace;
        font-size: 11px;
        line-height: 1.5;
        color: #cdd6f4;
        max-height: calc(100vh - 80px);
        overflow-y: auto;
        user-select: all;
      }
      #preview:empty::before {
        content: 'Select an element in the Elements panel…';
        color: #5f6368;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <button id="copy-btn">📋 Copy as MD</button>
      <button id="refresh-btn">🔄 Refresh</button>
    </div>
    <div id="status"></div>
    <pre id="preview"></pre>

    <script src="lib/turndown.js"></script>
    <script src="sidebar.js"></script>
  </body>
</html>
